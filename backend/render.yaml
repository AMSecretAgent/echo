# Render Blueprint — deploys Echo as one service (FastAPI serves the API + the built frontend).
# In Render: New + -> Blueprint -> pick this repo -> Apply, then fill in the two secret keys.
services:
  - type: web
    name: echo
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY            # set in dashboard (your Groq gsk_... key)
        sync: false
      - key: YOUTUBE_API_KEY        # set in dashboard (your Google API key)
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: ECHO_CREATOR_NAME
        value: Aarohi
      - key: ECHO_UPI_VPA
        value: creator@upi
